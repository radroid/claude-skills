# import-linter — modularity fitness function for Python.
# Installed by the `fitness-functions` skill. Run: lint-imports --config this
# Docs: https://import-linter.readthedocs.io
#
# Adjust `root_package` and the layer/module names to THIS repo (Phase 1).
# Place at repo root as `.importlinter` or pass via --config.

[importlinter]
root_package = myapp
include_external_packages = True

# Clean-architecture layering: higher layers may import lower, never the reverse.
[importlinter:contract:layers]
name = Layered architecture (domain ← application ← infrastructure)
type = layers
layers =
    myapp.infrastructure
    myapp.application
    myapp.domain

# Independence: feature/bounded-context packages must not import each other.
[importlinter:contract:independence]
name = Bounded contexts stay independent
type = independence
modules =
    myapp.billing
    myapp.accounts
    myapp.catalog

# Forbidden: the domain must never reach for framework/IO packages.
[importlinter:contract:forbidden]
name = Domain stays pure
type = forbidden
source_modules =
    myapp.domain
forbidden_modules =
    requests
    sqlalchemy
    django
