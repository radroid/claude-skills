# Architectural fitness functions — continuous integrity checks.
# Generated by the `fitness-functions` skill. Keep only the jobs for the
# functions you selected; delete the rest. Each job protects one architectural
# characteristic and passes/fails independently so PR feedback stays legible.
#
# Posture: jobs with `continue-on-error: true` are MONITORING (report, don't
# block). Remove that line to make a job GATING. To block merges, also add the
# job as a required status check in repo Settings → Branches.
#
# Pin every action to the version your research confirmed — never @main.

name: fitness-functions

on:
  pull_request:
  push:
    branches: [main, master]
  # schedule:            # uncomment for heavy scans (full SAST, perf)
  #   - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: fitness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Modularity: no circular deps / layering (JS/TS example) ───────────────
  modularity:
    name: Modularity (no cycles / layering)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - name: dependency-cruiser (cycles + boundaries)
        run: npx depcruise --config .dependency-cruiser.cjs src
        # continue-on-error: true   # ← monitoring; delete to gate

  # ── Complexity ceiling (example) ──────────────────────────────────────────
  complexity:
    name: Complexity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # swap in your stack's tool (eslint complexity / radon / pmd / gocyclo)
      - run: echo "replace with the complexity check selected in Phase 3"
        continue-on-error: true

  # ── Test coverage on new code (diff-coverage; legacy-friendly) ────────────
  coverage:
    name: Diff coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # diff-cover needs history
      # run your tests producing a coverage xml, then gate on changed lines:
      - run: echo "run tests -> coverage.xml, then: diff-cover coverage.xml --fail-under=80"
        continue-on-error: true

  # ── Dependency vulnerabilities (example: Trivy) ───────────────────────────
  dependency-scan:
    name: Dependency vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: "0"   # "1" to gate
